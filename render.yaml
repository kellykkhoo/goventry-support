# Render Blueprint — Flask API (Python) + Vite frontend (static site) + Postgres
#
# After the first Blueprint sync, set these in the goventry-support dashboard:
#   JWT_SECRET_KEY         — any long random string (32+ chars)
#   BOOTSTRAP_ADMIN_EMAIL  — your admin login email
#   BOOTSTRAP_ADMIN_PASSWORD — your admin login password
#   ANTHROPIC_API_KEY      — sk-ant-... (enables AI triage)
#   FORMSG_SECRET_KEY      — from FormSG form settings → Webhooks
#   POSTMAN_API_KEY        — optional, enables real email sending
#   POSTMAN_FROM           — e.g. support@goventry.gov.sg

services:
  # Flask API — replaces the old Next.js monolith, keeps the same URL
  - type: web
    name: goventry-support
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install uv && cd apps/backend && uv sync --frozen --no-dev
    startCommand: >-
      unset VIRTUAL_ENV &&
      cd apps/backend &&
      uv run flask --app wsgi:app db upgrade &&
      uv run flask --app wsgi:app bootstrap-admin &&
      uv run flask --app wsgi:app seed-demo --if-empty &&
      uv run gunicorn --bind 0.0.0.0:$PORT --workers 2 wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: goventry-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ORIGINS
        value: '["https://goventry-support-web.onrender.com"]'
      - key: FORMSG_WEBHOOK_URI
        value: https://goventry-support.onrender.com/webhooks/formsg
      # Set these in the Render dashboard (Blueprint does not manage their values):
      - key: JWT_SECRET_KEY
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FORMSG_SECRET_KEY
        sync: false
      - key: POSTMAN_API_KEY
        sync: false
      - key: POSTMAN_FROM
        sync: false

  # Vite frontend — static site, calls the Flask API above
  - type: web
    name: goventry-support-web
    runtime: static
    branch: main
    buildCommand: cd apps/frontend && npm ci && npm run build
    staticPublishPath: ./apps/frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://goventry-support.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: goventry-db
    plan: free
    databaseName: goventry
    user: goventry
